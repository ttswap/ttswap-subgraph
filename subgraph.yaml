specVersion: 1.0.0
description: ttswap is a decentralized protocol for automated token exchange on Ethereum.
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: TTSwap_Market
    network: mainnet
    source:
      address: "0x5C70a413fcb7ea8c8D478D06F31f8963cE4EE635"
      abi: TTSwap_Market
      startBlock: 24211660
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/ttswap_market.ts
      entities:
        - MarketState
        - GoodState
        - ProofState
        - Transaction
        - Customer
        - Refer
        - Gate
        - MarketData
        - GoodData
        - CustomerData
        - ReferData
        - GateData
      abis:
        - name: TTSwap_Market
          file: ./abis/TTSwap_Market.json
        - name: ERC20
          file: ./abis/ERC20.json
        - name: ERC20NameBytes
          file: ./abis/ERC20NameBytes.json
        - name: ERC20SymbolBytes
          file: ./abis/ERC20SymbolBytes.json
      eventHandlers:
        - event: e_initMetaGood(uint256,address,uint256,uint256,uint256)
          handler: handle_e_initMetaGood
        - event: e_initGood(uint256,address,address,uint256,uint256,uint256,uint256,address)
          handler: handle_e_initGood
        - event: e_buyGood(indexed address,indexed address,uint256,uint256,uint256,address)
          handler: handle_e_buyGood_v1_14        
        - event: e_buyGood(indexed address,indexed address,uint256,uint256,uint256,address,uint256)
          handler: handle_e_buyGood_v1_16
        - event: e_investGood(indexed uint256,address,address,uint256,uint256,uint256,address)
          handler: handle_e_investGood
        - event: e_disinvestProof(indexed uint256,address,address,address,uint256,uint256,uint256,uint256,uint256,address)
          handler: handle_e_disinvestProof
        - event: e_updateGoodConfig(address,uint256,address)
          handler: handle_e_updateGoodConfig
        - event: e_modifyGoodConfig(address,uint256,address)
          handler: handle_e_modifyGoodConfig
        - event: e_collectcommission(address[],uint256[],address)
          handler: handle_e_collectcommission
        - event: e_goodWelfare(address,uint128,address)
          handler: handle_e_goodWelfare
        - event: e_changegoodowner(address,address,address)
          handler: handle_e_changegoodowner
        - event: e_payGood(indexed address,indexed address,uint256,uint256,uint256,address,address,uint256)
          handler: handle_e_paygood
        - event: e_getPromiseProof(address,uint256)
          handler: handle_e_getPromiseProof
  - kind: ethereum/contract
    name: TTSwap_Token
    network: mainnet
    source:
      address: "0xE9D469b641bDCC9967AC19aefC038710d98F0B5d"
      abi: TTSwap_Token
      startBlock: 24211545
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/ttswap_token.ts
      entities:
        - Customer
        - MarketState
        - tts_env
        - tts_share
        - Refer
        - Gate
        - ttswap_publicsell_log
      abis:
        - name: TTSwap_Token
          file: ./abis/TTSwap_Token.json
      eventHandlers:
        - event: e_addreferral(address,address)
          handler: handle_e_addreferral
        - event: e_publicsell(uint256,uint256)
          handler: handle_e_publicsell
        - event: e_setenv(address)
          handler: handle_e_setenv
        - event: e_addShare(address,uint128,uint120,uint8)
          handler: handle_e_addShare
        - event: e_burnShare(address)
          handler: handle_e_burnShare
        - event: e_shareMint(uint128,address)
          handler: handle_e_shareMint
        - event: e_stakeinfo(address,uint256,uint256,uint256,uint256)
          handler: handle_e_stakeinfo
